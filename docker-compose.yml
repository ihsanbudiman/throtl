services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: throtl
      POSTGRES_PASSWORD: throtl
      POSTGRES_DB: throtl
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U throtl"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - THROTL_PORT=8080
      - THROTL_DB_URL=postgres://throtl:throtl@db:5432/throtl?sslmode=disable
      - THROTL_JWT_SECRET=change-me-to-a-secure-random-string
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/auth/check"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
